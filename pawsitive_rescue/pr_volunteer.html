<!DOCTYPE html>
<html lang="en">

<meta charset="utf-8">
<title>Want to volunteer?</title>
<h1 id="volunteer-form"></h1>
<p>Great! We'll guide you through the steps into to become a volunteer.</p>
<h1 class="org-name"></h1>
<h1 class="logo"></h1>
<ul>
    <li><label for="form-name">Name:</label> <input type="text" name="customername" id="form-name"></li>
    <li><label for="form-address">Address:</label> <input type="text" name="address" id="form-address"></li>
    <li><label for="form-tel">Telephone Number:</label> <input type="tel" name="telephone" id="form-tel"></li>
    <li><label for="form-email">Email: <input type="email" name="email" id="form-email"></label></li>
    <li>Volunteer instructions:<br>
    <textarea name="instructions" rows="4" cols="60" maxlength="400" id="form-story" placeholder="No more than 400 characters long."></textarea></li>
</ul>
<ul>
    <li><label><input type="Animal care" name="Weekdays" value="dog walking"></label></li>
    <li><label><input type="Event support" name="Weekends" value="cat care"></label></li>
    <li><label><input type="Office help" name="both" value="fostering"></label></li>
    <li><label><input type="fundraising"></label></li>
  </ul>
<nav>
    <h2 id="main-nav"></h2>
    <h2 class="nav-list"></h2>
    <h2 class="nav-link"></h2>
</nav>
</html>
